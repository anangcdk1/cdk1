<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CDK I Blora 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2d4a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        .main-wrapper {
            max-width: 1600px;
            width: 100%;
            background: #1a3a1a;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .nav-section {
            background: transparent;
            margin-bottom: 12px;
            display: flex;
            justify-content: flex-start;
            padding: 0 4px;
            overflow-x: auto;
            position: relative;
        }

        .page-nav {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            padding: 6px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            flex-wrap: wrap;
        }

        .nav-item {
            position: relative;
        }

        .page-nav a {
            background: transparent;
            color: #e0e0e0;
            font-size: 18px;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            white-space: nowrap;
            display: inline-block;
        }

        .page-nav a:hover, .page-nav a.active {
            background: #ffd700;
            color: #1a3a1a;
        }

        /* Dropdown submenu styles */
        .nav-item {
            position: relative;
        }

        .nav-item.has-children > a {
            position: relative;
            padding-right: 28px;
        }

        .nav-item.has-children > a::after {
            content: '▼';
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            transition: transform 0.3s ease;
        }

        .nav-item.has-children:hover > a::after {
            transform: translateY(-50%) rotate(180deg);
        }

        .dropdown-menu {
            position: absolute;
            top: 100%;
            left: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 8px 0;
            min-width: 180px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: all 0.3s ease;
            z-index: 100;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .nav-item:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu a {
            display: block;
            padding: 10px 20px;
            color: #e0e0e0;
            white-space: nowrap;
            border-radius: 0;
            font-size: 14px;
        }

        .dropdown-menu a:hover {
            background: #ffd700;
            color: #1a3a1a;
        }

        .content-row {
            display: flex;
            gap: 0;
            align-items: flex-start;
        }

        .image-wrapper {
            flex: 1;
            min-width: 0;
            position: relative;
            background: #e8f0e3;
            border-radius: 16px 0 0 16px;
            overflow: hidden;
            text-align: center;
            line-height: 0;
        }

        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        .highlight-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .highlight-area {
            position: absolute;
            background: rgba(0, 0, 0, 0.25);
            border: 2px solid #000000;
            box-sizing: border-box;
            transition: all 0.2s ease;

        }

        .pokja-sidebar {

            background: linear-gradient(135deg, #0d3b4f 0%, #0a2e3f 100%);
            border-radius: 0 16px 16px 0;
            border-left: 2px solid #00bcd4;
            display: flex;
            flex-direction: column;
        }

        .pokja-list {
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: center;
        }

        .pokja-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 188, 212, 0.15);
            color: #b2ebf2;
            text-decoration: none;
            transition: all 0.25s ease;

            flex: 1;

        .pokja-btn:not(:last-child) {

        .pokja-btn:hover, .pokja-btn.active {

        }

        .horizontal-text {

            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            transform: rotate(90deg);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 18px;
        }

        .error-message {
            background: rgba(255,0,0,0.2);
            border: 2px solid #ff4444;
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
        }

        /* ============================================ */
        /* POPUP STYLES */
        /* ============================================ */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            backdrop-filter: blur(5px);
        }

        .popup-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 1400px;
            height: 85%;

            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            z-index: 1001;

            flex-direction: column;
            overflow: hidden;
        }

        .popup-header {
            padding: 12px 20px;
            background: linear-gradient(135deg, #1a3a1a 0%, #0d2e0d 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px 16px 0 0;
            flex-shrink: 0;
        }

        .popup-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .popup-toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .popup-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;

            align-items: center;
            gap: 4px;
        }

        .popup-btn:hover {
            background: rgba(255, 255, 255, 0.3);

        }

        .popup-btn-close {

        }

        .popup-btn-close:hover {

        }

        .zoom-value {

        .popup-content-wrapper {
            flex: 1;
            overflow: auto;
            padding: 0;
            position: relative;

        }

        .popup-content {
            transform-origin: top left;
            transition: transform 0.2s ease;
            width: 100%;
            height: 100%;
        }

        .popup-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .popup-content img {
            max-width: 100%;
            height: auto;
            display: block;

<body>
<div class="main-wrapper" id="app">
    <div class="loading">⏳ Memuat data dari Google Sheet...</div>
</div>

<script>
    // ============================================================
    // KONFIGURASI
    // ============================================================
    const SHEET_ID = '16iACO_haYmDeOFGrMAig-WLiU-n2pVRtnjr8EGkOPg0';
    
    const SHEET_GID = {
        page: '0',
        klik: '475336072'
    };
    
    // Konfigurasi highlight
    const HIGHLIGHT_CONFIG = {
        defaultColor: 'rgba(0, 0, 0, 0.25)',
        borderColor: '#000000'
    };
    
    let pagesData = [];
    let klikData = [];
    let currentPageId = 'index';
    let currentHighlightOverlay = null;
    let currentPopup = null;
    
    // ============================================================
    // FUNGSI KONVERSI URL UNTUK EMBED
    // ============================================================
    
    function getEmbedUrl(url) {
        if (url.includes('youtu.be')) {
            const videoId = url.split('youtu.be/')[1].split('?')[0];
            return `https://www.youtube.com/embed/${videoId}?autoplay=0&rel=0`;
        }
        
        if (url.includes('youtube.com/watch')) {
            const urlParams = new URLSearchParams(url.split('?')[1]);
            const videoId = urlParams.get('v');
            if (videoId) {
                return `https://www.youtube.com/embed/${videoId}?autoplay=0&rel=0`;
            }
        }
        
        if (url.includes('youtube.com/embed')) {
            return url;
        }
        
        if (url.includes('drive.google.com/file')) {
            const match = url.match(/\/d\/(.+?)(\/|$)/);
            if (match) {
                const fileId = match[1];
                return `https://drive.google.com/file/d/${fileId}/preview`;
            }
        }
        
        if (url.includes('drive.google.com/open')) {
            const fileId = url.split('id=')[1].split('&')[0];
            if (fileId) {
                return `https://drive.google.com/file/d/${fileId}/preview`;
            }
        }
        
        if (url.includes('docs.google.com/document')) {
            const match = url.match(/\/d\/(.+?)(\/|$)/);
            if (match) {
                const docId = match[1];
                return `https://docs.google.com/document/d/${docId}/preview`;
            }
        }
        
        if (url.includes('docs.google.com/spreadsheets')) {
            const match = url.match(/\/d\/(.+?)(\/|$)/);
            if (match) {
                const sheetId = match[1];
                return `https://docs.google.com/spreadsheets/d/${sheetId}/preview`;
            }
        }
        
        if (url.includes('docs.google.com/presentation')) {
            const match = url.match(/\/d\/(.+?)(\/|$)/);
            if (match) {
                const slideId = match[1];
                return `https://docs.google.com/presentation/d/${slideId}/preview`;
            }
        }
        
        if (url.toLowerCase().endsWith('.pdf')) {
            return url;
        }
        
        if (url.match(/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i)) {
            return url;
        }
        
        return url;
    }
    
    function getContentType(url) {
        if (url.includes('youtube.com/embed') || url.includes('youtu.be')) return 'youtube';
        if (url.match(/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i)) return 'image';
        if (url.toLowerCase().endsWith('.pdf')) return 'pdf';
        return 'iframe';
    }
    
    // ============================================================
    // FUNGSI POPUP
    // ============================================================
    
    function openPopup(url, title) {
        closePopup();
        
        const embedUrl = getEmbedUrl(url);
        console.log(`🔗 Original URL: ${url}`);
        console.log(`🔗 Embed URL: ${embedUrl}`);
        
        const overlay = document.createElement('div');
        overlay.className = 'popup-overlay';
        
        const container = document.createElement('div');
        container.className = 'popup-container';
        
        const header = document.createElement('div');
        header.className = 'popup-header';
        
        const titleSpan = document.createElement('div');
        titleSpan.className = 'popup-title';
        titleSpan.innerHTML = `📋 ${title || 'Popup'}`;
        
        const toolbar = document.createElement('div');
        toolbar.className = 'popup-toolbar';
        
        const zoomOutBtn = document.createElement('button');
        zoomOutBtn.className = 'popup-btn';
        zoomOutBtn.innerHTML = '<span class="emoji">🔍</span><span>−</span>';
        zoomOutBtn.title = 'Zoom Out (Ctrl + -)';
        
        const zoomValue = document.createElement('span');
        zoomValue.className = 'zoom-value';
        zoomValue.textContent = '100%';
        
        const zoomInBtn = document.createElement('button');
        zoomInBtn.className = 'popup-btn';
        zoomInBtn.innerHTML = '<span class="emoji">🔍</span><span>+</span>';
        zoomInBtn.title = 'Zoom In (Ctrl + +)';
        
        const resetBtn = document.createElement('button');
        resetBtn.className = 'popup-btn';
        resetBtn.innerHTML = '<span>⟳</span><span>100%</span>';
        resetBtn.title = 'Reset Zoom (Ctrl + 0)';
        
        const newTabBtn = document.createElement('button');
        newTabBtn.className = 'popup-btn';
        newTabBtn.innerHTML = '<span>🔗</span><span>Tab Baru</span>';
        newTabBtn.title = 'Buka di Tab Baru';
        
        const fullscreenBtn = document.createElement('button');
        fullscreenBtn.className = 'popup-btn';
        fullscreenBtn.innerHTML = '<span>⤢</span><span>Fullscreen</span>';
        fullscreenBtn.title = 'Fullscreen';
        
        const closeBtn = document.createElement('button');
        closeBtn.className = 'popup-btn popup-btn-close';
        closeBtn.innerHTML = '<span>✕</span><span>Tutup</span>';
        closeBtn.title = 'Tutup (ESC)';
        
        toolbar.appendChild(zoomOutBtn);
        toolbar.appendChild(zoomValue);
        toolbar.appendChild(zoomInBtn);
        toolbar.appendChild(resetBtn);
        toolbar.appendChild(newTabBtn);
        toolbar.appendChild(fullscreenBtn);
        toolbar.appendChild(closeBtn);
        
        header.appendChild(titleSpan);
        header.appendChild(toolbar);
        
        const contentWrapper = document.createElement('div');
        contentWrapper.className = 'popup-content-wrapper';
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'popup-content';
        
        const contentType = getContentType(embedUrl);
        let contentElement;
        
        if (contentType === 'image') {
            contentElement = document.createElement('img');
            contentElement.src = embedUrl;
            contentElement.alt = title || 'Gambar';
            contentElement.style.maxWidth = '100%';
            contentElement.style.height = 'auto';
        } else {
            contentElement = document.createElement('iframe');
            contentElement.src = embedUrl;
            contentElement.title = title || 'Konten';
            contentElement.allow = "fullscreen";
            contentElement.style.width = '100%';
            contentElement.style.height = '100%';
            contentElement.style.border = 'none';
            contentElement.setAttribute('frameborder', '0');
            contentElement.setAttribute('allowfullscreen', 'true');
            contentElement.setAttribute('allow', 'autoplay; fullscreen');
        }
        
        contentDiv.appendChild(contentElement);
        contentWrapper.appendChild(contentDiv);
        
        container.appendChild(header);
        container.appendChild(contentWrapper);
        overlay.appendChild(container);
        
        document.body.appendChild(overlay);
        
        currentPopup = {
            overlay,
            container,
            contentDiv,
            contentElement,
            zoomValue,
            currentZoom: 100,
            originalUrl: url,
            embedUrl: embedUrl
        };
        
        function updateZoom() {
            const zoom = currentPopup.currentZoom / 100;
            currentPopup.contentDiv.style.transform = `scale(${zoom})`;
            
            if (currentPopup.contentElement.tagName === 'IFRAME') {
                currentPopup.contentDiv.style.width = `${100 / zoom}%`;
                currentPopup.contentDiv.style.height = `${100 / zoom}%`;
            }
            
            currentPopup.zoomValue.textContent = `${currentPopup.currentZoom}%`;
        }
        
        function zoomIn() {
            if (currentPopup.currentZoom < 200) {
                currentPopup.currentZoom = Math.min(currentPopup.currentZoom + 10, 200);
                updateZoom();
            }
        }
        
        function zoomOut() {
            if (currentPopup.currentZoom > 50) {
                currentPopup.currentZoom = Math.max(currentPopup.currentZoom - 10, 50);
                updateZoom();
            }
        }
        
        function resetZoom() {
            currentPopup.currentZoom = 100;
            updateZoom();
        }
        
        zoomInBtn.onclick = zoomIn;
        zoomOutBtn.onclick = zoomOut;
        resetBtn.onclick = resetZoom;
        
        newTabBtn.onclick = () => {
            window.open(currentPopup.originalUrl, '_blank');
        };
        
        fullscreenBtn.onclick = () => {
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            } else if (container.msRequestFullscreen) {
                container.msRequestFullscreen();
            }
        };
        
        const closePopupHandler = () => closePopup();
        closeBtn.onclick = closePopupHandler;
        overlay.onclick = (e) => {
            if (e.target === overlay) closePopupHandler();
        };
        
        const keyboardHandler = (e) => {
            if (!currentPopup) return;
            
            switch(e.key) {
                case 'Escape':
                    closePopupHandler();
                    break;
                case '+':
                case '=':
                    if (e.ctrlKey) {
                        e.preventDefault();
                        zoomIn();
                    }
                    break;
                case '-':
                    if (e.ctrlKey) {
                        e.preventDefault();
                        zoomOut();
                    }
                    break;
                case '0':
                    if (e.ctrlKey) {
                        e.preventDefault();
                        resetZoom();
                    }
                    break;
            }
        };
        
        document.addEventListener('keydown', keyboardHandler);
        currentPopup.keyboardHandler = keyboardHandler;
        
        if (contentElement.tagName === 'IFRAME') {
            setTimeout(() => {
                try {
                    const iframeDoc = contentElement.contentDocument || contentElement.contentWindow?.document;
                    if (!iframeDoc || !iframeDoc.body || iframeDoc.body.innerHTML === '') {
                    }
                } catch (e) {
                    console.warn('Cannot access iframe content (cross-origin)');
                }
            }, 3000);
        }
        
        updateZoom();
    }
    
    function closePopup() {
        if (currentPopup) {
            if (currentPopup.keyboardHandler) {
                document.removeEventListener('keydown', currentPopup.keyboardHandler);
            }
            currentPopup.overlay.remove();
            currentPopup = null;
        }
    }
    
    // ============================================================
    // FUNGSI BACA GOOGLE SHEET
    // ============================================================
    async function fetchSheetAsCSV(gid) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
        
        try {
            console.log(`🔄 Fetching sheet gid ${gid}...`);
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const csvText = await response.text();
            console.log(`✅ Sheet gid ${gid} loaded, length: ${csvText.length}`);
            
            if (csvText.length === 0 || csvText.includes('<html>') || csvText.includes('DOCTYPE')) {
                console.warn(`⚠️ Sheet gid ${gid} returned HTML instead of CSV`);
                return [];
            }
            
            return parseCSV(csvText);
        } catch (error) {
            console.error(`❌ Error fetching sheet gid ${gid}:`, error);
            return [];
        }
    }
    
    function parseCSV(csvText) {
        const rows = [];
        const lines = csvText.split('\n');
        
        if (lines.length < 2) {
            console.warn('CSV has less than 2 rows');
            return [];
        }
        
        let headers = [];
        let inQuote = false;
        let currentHeader = '';
        
        for (let i = 0; i < lines[0].length; i++) {
            const char = lines[0][i];
            if (char === '"') {
                inQuote = !inQuote;
            } else if (char === ',' && !inQuote) {
                headers.push(currentHeader.trim().replace(/^"|"$/g, ''));
                currentHeader = '';
            } else {
                currentHeader += char;
            }
        }
        headers.push(currentHeader.trim().replace(/^"|"$/g, ''));
        
        console.log('📋 Headers:', headers);
        
        for (let i = 1; i < lines.length; i++) {
            if (lines[i].trim() === '') continue;
            
            const values = [];
            inQuote = false;
            let currentValue = '';
            
            for (let j = 0; j < lines[i].length; j++) {
                const char = lines[i][j];
                if (char === '"') {
                    inQuote = !inQuote;
                } else if (char === ',' && !inQuote) {
                    values.push(currentValue.trim().replace(/^"|"$/g, ''));
                    currentValue = '';
                } else {
                    currentValue += char;
                }
            }
            values.push(currentValue.trim().replace(/^"|"$/g, ''));
            
            const obj = {};
            headers.forEach((header, idx) => {
                obj[header] = values[idx] || '';
            });
            rows.push(obj);
        }
        
        console.log(`📊 Parsed ${rows.length} rows from CSV`);
        if (rows.length > 0) {
            console.log(`📋 First row:`, rows[0]);
        }
        return rows;
    }
    
    async function loadAllData() {
        try {
            console.log('🔄 Loading data from Google Sheet...');
            console.log(`📋 Sheet ID: ${SHEET_ID}`);
            
            const [pageRaw, klikRaw] = await Promise.all([
                fetchSheetAsCSV(SHEET_GID.page),
                fetchSheetAsCSV(SHEET_GID.klik)
            ]);
            
            pagesData = pageRaw;
            klikData = klikRaw;
            
            console.log(`✅ Pages loaded: ${pagesData.length} rows`);
            console.log(`✅ Klik areas loaded: ${klikData.length} rows`);
            
            if (pagesData.length > 0) {
                console.log('📊 Kolom yang tersedia di sheet page:', Object.keys(pagesData[0]));
            }
            
            if (pagesData.length === 0) {
                console.error('❌ No data in "page" sheet.');
                return false;
            }
            
            return true;
        } catch (error) {
            console.error('❌ Error loading data:', error);
            return false;
        }
    }
    
    // ============================================================
    // FUNGSI MEMBUAT AREA KLIK
    // ============================================================
    
    function showHighlightOverlay(areas, imgElement, referenceWidth, referenceHeight, currentWidth, currentHeight) {
        if (currentHighlightOverlay) {
            currentHighlightOverlay.remove();
        }
        
        const wrapper = document.querySelector('.image-wrapper');
        if (!wrapper) return;
        
        const scaleX = currentWidth / referenceWidth;
        const scaleY = currentHeight / referenceHeight;
        
        const overlay = document.createElement('div');
        overlay.className = 'highlight-overlay';
        
        areas.forEach(area => {
            if (!area.coords || area.coords.trim() === '') return;
            
            const coordsParts = area.coords.split(',').map(Number);
            let left, top, width, height;
            
            switch(area.shape) {
                case 'rect':
                    if (coordsParts.length === 4) {
                        left = Math.round(coordsParts[0] * scaleX);
                        top = Math.round(coordsParts[1] * scaleY);
                        width = Math.round((coordsParts[2] - coordsParts[0]) * scaleX);
                        height = Math.round((coordsParts[3] - coordsParts[1]) * scaleY);
                        
                        const highlightDiv = document.createElement('div');
                        highlightDiv.className = 'highlight-area';
                        highlightDiv.style.left = left + 'px';
                        highlightDiv.style.top = top + 'px';
                        highlightDiv.style.width = width + 'px';
                        highlightDiv.style.height = height + 'px';
                        highlightDiv.style.background = HIGHLIGHT_CONFIG.defaultColor;
                        highlightDiv.style.border = `2px solid ${HIGHLIGHT_CONFIG.borderColor}`;
                        highlightDiv.title = area.title;
                        
                        overlay.appendChild(highlightDiv);
                    }
                    break;
                case 'circle':
                    if (coordsParts.length === 3) {
                        const cx = Math.round(coordsParts[0] * scaleX);
                        const cy = Math.round(coordsParts[1] * scaleY);
                        const r = Math.round(coordsParts[2] * Math.min(scaleX, scaleY));
                        
                        const highlightDiv = document.createElement('div');
                        highlightDiv.className = 'highlight-area';
                        highlightDiv.style.left = (cx - r) + 'px';
                        highlightDiv.style.top = (cy - r) + 'px';
                        highlightDiv.style.width = (r * 2) + 'px';
                        highlightDiv.style.height = (r * 2) + 'px';
                        highlightDiv.style.borderRadius = '50%';
                        highlightDiv.style.background = HIGHLIGHT_CONFIG.defaultColor;
                        highlightDiv.style.border = `2px solid ${HIGHLIGHT_CONFIG.borderColor}`;
                        highlightDiv.title = area.title;
                        
                        overlay.appendChild(highlightDiv);
                    }
                    break;
                case 'poly':
                    if (coordsParts.length >= 6) {
                        let minX = coordsParts[0], maxX = coordsParts[0];
                        let minY = coordsParts[1], maxY = coordsParts[1];
                        for (let i = 2; i < coordsParts.length; i += 2) {
                            minX = Math.min(minX, coordsParts[i]);
                            maxX = Math.max(maxX, coordsParts[i]);
                            minY = Math.min(minY, coordsParts[i+1]);
                            maxY = Math.max(maxY, coordsParts[i+1]);
                        }
                        left = Math.round(minX * scaleX);
                        top = Math.round(minY * scaleY);
                        width = Math.round((maxX - minX) * scaleX);
                        height = Math.round((maxY - minY) * scaleY);
                        
                        const highlightDiv = document.createElement('div');
                        highlightDiv.className = 'highlight-area';
                        highlightDiv.style.left = left + 'px';
                        highlightDiv.style.top = top + 'px';
                        highlightDiv.style.width = width + 'px';
                        highlightDiv.style.height = height + 'px';
                        highlightDiv.style.background = HIGHLIGHT_CONFIG.defaultColor;
                        highlightDiv.style.border = `2px solid ${HIGHLIGHT_CONFIG.borderColor}`;
                        highlightDiv.style.opacity = '0.5';
                        highlightDiv.title = area.title;
                        
                        overlay.appendChild(highlightDiv);
                    }
                    break;
            }
        });
        
        if (overlay.children.length > 0) {
            wrapper.style.position = 'relative';
            wrapper.appendChild(overlay);
            currentHighlightOverlay = overlay;
        }
    }
    
    function createClickableAreas(pageId, imgElement, mapElement) {
        if (!imgElement || !mapElement) {
            console.error('❌ imgElement atau mapElement null');
            return;
        }
        
        const areasForPage = klikData.filter(area => {
            const isActive = String(area.is_active || '').toUpperCase();
            const isValidActive = isActive === 'TRUE' || isActive === 'YES' || isActive === '1';
            const isValidPage = (area.page_id === pageId) || (area.page_id === 'ALL');
            return isValidPage && isValidActive;
        });
        
        console.log(`📍 Area untuk page "${pageId}" + ALL: ${areasForPage.length} area ditemukan`);
        
        const currentWidth = imgElement.clientWidth;
        const currentHeight = imgElement.clientHeight;
        
        console.log(`📐 Ukuran gambar tampilan: ${currentWidth} x ${currentHeight}`);
        
        if (currentWidth === 0 || currentHeight === 0) {
            console.warn('⚠️ Ukuran gambar 0, tunggu load');
            return;
        }
        
        const pageInfo = pagesData.find(p => p.page_id === pageId);
        const referenceWidth = parseInt(pageInfo?.original_width) || 1512;
        const referenceHeight = parseInt(pageInfo?.original_height) || 1023;
        
        const scaleX = currentWidth / referenceWidth;
        const scaleY = currentHeight / referenceHeight;
        
        console.log(`📏 Referensi dari sheet: ${referenceWidth}x${referenceHeight}`);
        console.log(`📏 Scale: ${scaleX.toFixed(4)} x ${scaleY.toFixed(4)}`);
        
        mapElement.innerHTML = '';
        
        const highlightAreas = [];
        
        areasForPage.forEach((area, idx) => {
            console.log(`📌 Area ${idx+1}: ${area.title} | coords: ${area.coords} | page_id: ${area.page_id}`);
            
            if (!area.coords || area.coords.trim() === '') {
                console.warn(`⚠️ Area ${area.title} tidak memiliki koordinat`);
                return;
            }
            
            const coordsParts = area.coords.split(',').map(Number);
            let scaledCoords = '';
            
            switch(area.shape) {
                case 'rect':
                    if (coordsParts.length === 4) {
                        scaledCoords = `${Math.round(coordsParts[0] * scaleX)},${Math.round(coordsParts[1] * scaleY)},${Math.round(coordsParts[2] * scaleX)},${Math.round(coordsParts[3] * scaleY)}`;
                    }
                    break;
                case 'circle':
                    if (coordsParts.length === 3) {
                        scaledCoords = `${Math.round(coordsParts[0] * scaleX)},${Math.round(coordsParts[1] * scaleY)},${Math.round(coordsParts[2] * Math.min(scaleX, scaleY))}`;
                    }
                    break;
                case 'poly':
                    const scaledPoints = [];
                    for (let i = 0; i < coordsParts.length; i += 2) {
                        if (i + 1 < coordsParts.length) {
                            scaledPoints.push(Math.round(coordsParts[i] * scaleX));
                            scaledPoints.push(Math.round(coordsParts[i+1] * scaleY));
                        }
                    }
                    scaledCoords = scaledPoints.join(',');
                    break;
                default:
                    console.warn(`⚠️ Unknown shape: ${area.shape}`);
                    return;
            }
            
            if (!scaledCoords) {
                console.warn(`⚠️ Gagal membuat koordinat untuk ${area.title}`);
                return;
            }
            
            const areaElement = document.createElement('area');
            areaElement.setAttribute('shape', area.shape);
            areaElement.setAttribute('coords', scaledCoords);
            areaElement.setAttribute('title', area.title);
            areaElement.setAttribute('alt', area.title);
            areaElement.style.cursor = 'pointer';
            
            const actionType = String(area.action_type || '').toUpperCase();
            const target = area.target_page || '';
            
            if (target && target !== '') {
                areaElement.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log(`🔘 Diklik: ${area.title} | action: ${actionType || 'internal'} | target: ${target}`);
                    
                    if (actionType === 'POPUP') {
                        openPopup(target, area.title);
                    } else if (actionType === 'URL' || target.startsWith('http://') || target.startsWith('https://')) {
                        window.open(target, '_blank');
                    } else if (pagesData.find(p => p.page_id === target)) {
                        currentPageId = target;
                        renderPage();
                    } else {
                        console.warn(`⚠️ Target "${target}" tidak dikenali`);
                        alert(`Target "${target}" tidak valid`);
                    }
                });
            }
            
            mapElement.appendChild(areaElement);
            
            const showHighlight = String(area.show_highlight || '').toUpperCase();
            if (showHighlight === 'ON' || showHighlight === 'TRUE' || showHighlight === 'YES') {
                highlightAreas.push(area);
            }
        });
        
        console.log(`✅ Total area dibuat: ${mapElement.children.length}`);
        imgElement.setAttribute('usemap', '#dynamicMap');
        
        if (highlightAreas.length > 0) {
            showHighlightOverlay(highlightAreas, imgElement, referenceWidth, referenceHeight, currentWidth, currentHeight);
        }
    }
    
    // ============================================================
    // FUNGSI RENDER HALAMAN
    // Sub menu hanya untuk top navigation (menu atas)
    // Sidebar tetap sederhana tanpa sub menu
    // ============================================================
    
    function buildTopMenuHierarchy() {
        // Ambil semua menu top yang aktif
        const topMenus = pagesData.filter(p => {
            const isActive = String(p.is_active_top || '').toUpperCase();
            return isActive === 'TRUE' || isActive === 'YES' || isActive === '1';
        }).sort((a,b) => {
            const orderA = parseInt(a.order) || 0;
            const orderB = parseInt(b.order) || 0;
            return orderA - orderB;
        });
        
        // Pisahkan parent dan child berdasarkan kolom menu_type dan parent_id
        const parents = [];
        const children = {};
        
        topMenus.forEach(menu => {
            const menuType = String(menu.menu_type || '').toUpperCase();
            const parentId = menu.parent_id || '';
            
            if (menuType === 'SUB' && parentId !== '') {
                // Ini adalah child menu (sub menu)
                if (!children[parentId]) {
                    children[parentId] = [];
                }
                children[parentId].push(menu);
                console.log(`📌 Sub menu: ${menu.label_menu} -> parent: ${parentId}`);
            } else {
                // Ini adalah parent menu
                parents.push(menu);
                console.log(`📌 Parent menu: ${menu.label_menu} (${menu.page_id})`);
            }
        });
        
        return { parents, children };
    }
    
    function setSidebarHeight(imgElement) {
        const sidebar = document.getElementById('pokjaSidebar');
        if (sidebar && imgElement && imgElement.clientHeight > 0) {
            sidebar.style.height = imgElement.clientHeight + 'px';
        }
    }
    
    function getImageUrl(imageId) {
        if (!imageId) return '';
        if (imageId.startsWith('http://') || imageId.startsWith('https://')) {
            return imageId;
        }
        return `https://lh3.googleusercontent.com/d/${imageId}`;
    }
    
    function renderPage() {
        // Ambil sidebar menus (tanpa sub menu)
        const sideMenus = pagesData.filter(p => {
            const isActive = String(p.is_active_sidebar || '').toUpperCase();
            return isActive === 'TRUE' || isActive === 'YES' || isActive === '1';
        }).sort((a,b) => {
            const orderA = parseInt(a.order) || 0;
            const orderB = parseInt(b.order) || 0;
            return orderA - orderB;
        });
        
        // Filter hanya parent menu untuk sidebar (menu_type bukan SUB)
        const sidebarParentMenus = sideMenus.filter(menu => {
            const menuType = String(menu.menu_type || '').toUpperCase();
            return menuType !== 'SUB';
        });
        
        const { parents: topParents, children: topChildren } = buildTopMenuHierarchy();
        
        const currentPage = pagesData.find(p => p.page_id === currentPageId);
        if (!currentPage) {
            document.getElementById('app').innerHTML = '<div class="loading">❌ Halaman tidak ditemukan</div>';
            return;
        }
        
        const imageUrl = getImageUrl(currentPage.image_id || currentPage.image_url);
        
        // Tentukan active top menu
        let activeTopId = null;
        const currentMenuType = String(currentPage.menu_type || '').toUpperCase();
        
        if (currentMenuType === 'SUB') {
            // Jika current page adalah sub menu, cari parent-nya
            const parentId = currentPage.parent_id;
            if (parentId) {
                activeTopId = parentId;
            } else {
                activeTopId = currentPage.page_id;
            }
        } else {
            activeTopId = currentPage.page_id;
        }
        
        // Bangun HTML top navigation dengan dropdown
        let topNavHtml = '<div class="page-nav">';
        
        topParents.forEach(parent => {
            const hasChildren = topChildren[parent.page_id] && topChildren[parent.page_id].length > 0;
            const isActive = activeTopId === parent.page_id;
            
            if (hasChildren) {
                // Menu dengan dropdown
                topNavHtml += `<div class="nav-item has-children">
                    <a class="${isActive ? 'active' : ''}" data-page="${parent.page_id}">${parent.label_menu}</a>
                    <div class="dropdown-menu">`;
                
                topChildren[parent.page_id].forEach(child => {
                    topNavHtml += `<a data-page="${child.page_id}">${child.label_menu}</a>`;
                });
                
                topNavHtml += `</div></div>`;
            } else {
                // Menu biasa tanpa dropdown
                topNavHtml += `<div class="nav-item">
                    <a class="${isActive ? 'active' : ''}" data-page="${parent.page_id}">${parent.label_menu}</a>
                </div>`;
            }
        });
        
        topNavHtml += '</div>';
        
        // Bangun HTML sidebar (sederhana, tanpa sub menu)
        let sidebarHtml = '<div class="pokja-list">';
        
        sidebarParentMenus.forEach(menu => {
            const isActive = currentPageId === menu.page_id;
            sidebarHtml += `
                <div class="pokja-btn ${isActive ? 'active' : ''}" data-page="${menu.page_id}">
                    <div class="horizontal-text">${menu.label_menu}</div>
                </div>
            `;
        });
        
        sidebarHtml += '</div>';
        
        const html = `
            <div class="nav-section">
                ${topNavHtml}
            </div>
            <div class="content-row">
                <div class="image-wrapper">
                    <img src="${imageUrl}" alt="${currentPage.title}" id="mainImage">
                    <map name="dynamicMap" id="dynamicMap"></map>
                </div>
                <div class="pokja-sidebar" id="pokjaSidebar">
                    ${sidebarHtml}
                </div>
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        
        // Event handler untuk top menu (termasuk dropdown items)
        document.querySelectorAll('.page-nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const pageId = link.getAttribute('data-page');
                if (pageId) {
                    console.log(`🔄 Pindah ke halaman: ${pageId}`);
                    currentPageId = pageId;
                    renderPage();
                }
            });
        });
        
        // Event handler untuk sidebar
        document.querySelectorAll('.pokja-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const pageId = btn.getAttribute('data-page');
                if (pageId) {
                    console.log(`🔄 Pindah ke halaman (sidebar): ${pageId}`);
                    currentPageId = pageId;
                    renderPage();
                }
            });
        });
        
        const img = document.getElementById('mainImage');
        const mapEl = document.getElementById('dynamicMap');
        
        img.onerror = function() {
            console.error(`❌ Gambar gagal dimuat: ${imageUrl}`);
            this.alt = 'Gambar tidak tersedia';
            this.style.backgroundColor = '#ccc';
            this.style.minHeight = '200px';
        };
        
        if (img.complete && img.naturalHeight !== 0) {
            console.log('🖼️ Gambar sudah complete');
            createClickableAreas(currentPageId, img, mapEl);
            setSidebarHeight(img);
        } else {
            img.addEventListener('load', () => {
                console.log('🖼️ Gambar loaded');
                createClickableAreas(currentPageId, img, mapEl);
                setSidebarHeight(img);
            });
        }
        
        let resizeTimeout;
        window.removeEventListener('resize', handleResize);
        window.addEventListener('resize', handleResize);
        
        function handleResize() {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                const imgElement = document.getElementById('mainImage');
                const mapElement = document.getElementById('dynamicMap');
                if (imgElement && imgElement.clientHeight > 0 && mapElement) {
                    console.log('📱 Resize detected');
                    createClickableAreas(currentPageId, imgElement, mapElement);
                    setSidebarHeight(imgElement);
                }
            }, 100);
        }
    }
    
    // ============================================================
    // INITIALIZATION
    // ============================================================
    async function init() {
        console.log('🚀 Initializing website...');
        const success = await loadAllData();
        if (success && pagesData.length > 0) {
            renderPage();
        } else {
            let errorMsg = '❌ Gagal memuat data. Periksa:<br><br>';
            errorMsg += '1. <b>Sheet sudah dipublish?</b> (File → Share → Publish to web → CSV)<br>';
            errorMsg += '2. <b>Sheet "page"</b> sudah diisi minimal 1 baris?<br>';
            errorMsg += '3. <b>Pastikan sheet bisa diakses publik</b><br>';
            errorMsg += '<br><b>Tekan F12 untuk melihat detail error di console</b>';
            document.getElementById('app').innerHTML = `<div class="loading"><div class="error-message">${errorMsg}</div></div>`;
        }
    }
    
    init();
</script>
