<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CDK I Blora 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2d4a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        .main-wrapper {
            max-width: 1600px;
            width: 100%;
            background: #1a3a1a;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .nav-section {
            background: transparent;
            margin-bottom: 12px;
            display: flex;
            justify-content: flex-start;
            padding: 0 4px;
            overflow-x: auto;
        }

        .page-nav {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            padding: 6px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .page-nav a {
            background: transparent;
            color: #e0e0e0;
            font-size: 18px;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            white-space: nowrap;
        }

        .page-nav a:hover, .page-nav a.active {
            background: #ffd700;
            color: #1a3a1a;
        }

        .content-row {
            display: flex;
            gap: 0;
            align-items: flex-start;
        }

        .image-wrapper {
            flex: 1;
            min-width: 0;
            position: relative;
            background: #e8f0e3;
            border-radius: 16px 0 0 16px;
            overflow: hidden;
            text-align: center;
            line-height: 0;
        }

        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Highlight overlay untuk visualisasi area klik */
        .highlight-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .highlight-area {
            position: absolute;
            background: rgba(0, 0, 0);
            border: 2px solid #ffd700;
            box-sizing: border-box;
            transition: all 0.2s ease;
            pointer-events: none;
        }

        .pokja-sidebar {
            width: 45px;
            background: linear-gradient(135deg, #0d3b4f 0%, #0a2e3f 100%);
            border-radius: 0 16px 16px 0;
            border-left: 2px solid #00bcd4;
            display: flex;
            flex-direction: column;
        }

        .pokja-list {
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: center;
        }

        .pokja-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 188, 212, 0.15);
            color: #b2ebf2;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            flex: 1;
            min-height: 70px;
        }

        .pokja-btn:not(:last-child) {
            border-bottom: 1px solid rgba(0, 188, 212, 0.35);
        }

        .pokja-btn:hover, .pokja-btn.active {
            background: #ffd700;
            color: #1a3a1a;
        }

        .horizontal-text {
            display: inline-block;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            transform: rotate(90deg);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 18px;
        }

        .error-message {
            background: rgba(255,0,0,0.2);
            border: 2px solid #ff4444;
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
        }
    </style>
</head>
<body>
<div class="main-wrapper" id="app">
    <div class="loading">⏳ Memuat data dari Google Sheet...</div>
</div>

<script>
    // ============================================================
    // KONFIGURASI
    // ============================================================
    const SHEET_ID = '16iACO_haYmDeOFGrMAig-WLiU-n2pVRtnjr8EGkOPg0';
    
    const SHEET_GID = {
        page: '0',
        klik: '475336072'  // Ganti dengan GID yang benar dari sheet "klik"
    };
    
    // Konfigurasi highlight (warna ditentukan di kode)
    const HIGHLIGHT_CONFIG = {
        defaultColor: 'rgba(0, 0, 0)',
        borderColor: '#ffd700'
    };
    
    let pagesData = [];
    let klikData = [];
    let currentPageId = 'index';
    let currentHighlightOverlay = null;
    
    // ============================================================
    // FUNGSI BACA GOOGLE SHEET (tanpa CORS)
    // ============================================================
    async function fetchSheetAsCSV(gid) {
        const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&gid=${gid}`;
        
        try {
            console.log(`🔄 Fetching sheet gid ${gid}...`);
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const csvText = await response.text();
            console.log(`✅ Sheet gid ${gid} loaded, length: ${csvText.length}`);
            
            if (csvText.length === 0 || csvText.includes('<html>') || csvText.includes('DOCTYPE')) {
                console.warn(`⚠️ Sheet gid ${gid} returned HTML instead of CSV`);
                return [];
            }
            
            return parseCSV(csvText);
        } catch (error) {
            console.error(`❌ Error fetching sheet gid ${gid}:`, error);
            return [];
        }
    }
    
    function parseCSV(csvText) {
        const rows = [];
        const lines = csvText.split('\n');
        
        if (lines.length < 2) {
            console.warn('CSV has less than 2 rows');
            return [];
        }
        
        // Parse headers dengan lebih baik
        let headers = [];
        let inQuote = false;
        let currentHeader = '';
        
        for (let i = 0; i < lines[0].length; i++) {
            const char = lines[0][i];
            if (char === '"') {
                inQuote = !inQuote;
            } else if (char === ',' && !inQuote) {
                headers.push(currentHeader.trim().replace(/^"|"$/g, ''));
                currentHeader = '';
            } else {
                currentHeader += char;
            }
        }
        headers.push(currentHeader.trim().replace(/^"|"$/g, ''));
        
        console.log('📋 Headers:', headers);
        
        for (let i = 1; i < lines.length; i++) {
            if (lines[i].trim() === '') continue;
            
            const values = [];
            inQuote = false;
            let currentValue = '';
            
            for (let j = 0; j < lines[i].length; j++) {
                const char = lines[i][j];
                if (char === '"') {
                    inQuote = !inQuote;
                } else if (char === ',' && !inQuote) {
                    values.push(currentValue.trim().replace(/^"|"$/g, ''));
                    currentValue = '';
                } else {
                    currentValue += char;
                }
            }
            values.push(currentValue.trim().replace(/^"|"$/g, ''));
            
            const obj = {};
            headers.forEach((header, idx) => {
                obj[header] = values[idx] || '';
            });
            rows.push(obj);
        }
        
        console.log(`📊 Parsed ${rows.length} rows from CSV`);
        if (rows.length > 0) {
            console.log(`📋 First row:`, rows[0]);
        }
        return rows;
    }
    
    async function loadAllData() {
        try {
            console.log('🔄 Loading data from Google Sheet...');
            console.log(`📋 Sheet ID: ${SHEET_ID}`);
            
            const [pageRaw, klikRaw] = await Promise.all([
                fetchSheetAsCSV(SHEET_GID.page),
                fetchSheetAsCSV(SHEET_GID.klik)
            ]);
            
            pagesData = pageRaw;
            klikData = klikRaw;
            
            console.log(`✅ Pages loaded: ${pagesData.length} rows`);
            console.log(`✅ Klik areas loaded: ${klikData.length} rows`);
            
            // Debug data klik
            if (klikData.length > 0) {
                console.log('📊 Sample klik data:', klikData[0]);
                console.log('📊 All klik data:', klikData);
            } else {
                console.warn('⚠️ Tidak ada data di sheet klik!');
            }
            
            if (pagesData.length === 0) {
                console.error('❌ No data in "page" sheet.');
                return false;
            }
            
            return true;
        } catch (error) {
            console.error('❌ Error loading data:', error);
            return false;
        }
    }
    
    // ============================================================
    // FUNGSI MEMBUAT AREA KLIK
    // ============================================================
    
    // Fungsi untuk menampilkan highlight overlay berdasarkan setting di sheet
    function showHighlightOverlay(areas, imgElement, scaleX, scaleY) {
        // Hapus overlay lama
        if (currentHighlightOverlay) {
            currentHighlightOverlay.remove();
        }
        
        const wrapper = document.querySelector('.image-wrapper');
        if (!wrapper) return;
        
        const overlay = document.createElement('div');
        overlay.className = 'highlight-overlay';
        
        areas.forEach(area => {
            if (!area.coords || area.coords.trim() === '') return;
            
            const coordsParts = area.coords.split(',').map(Number);
            let left, top, width, height;
            
            switch(area.shape) {
                case 'rect':
                    if (coordsParts.length === 4) {
                        left = Math.round(coordsParts[0] * scaleX);
                        top = Math.round(coordsParts[1] * scaleY);
                        width = Math.round((coordsParts[2] - coordsParts[0]) * scaleX);
                        height = Math.round((coordsParts[3] - coordsParts[1]) * scaleY);
                        
                        const highlightDiv = document.createElement('div');
                        highlightDiv.className = 'highlight-area';
                        highlightDiv.style.left = left + 'px';
                        highlightDiv.style.top = top + 'px';
                        highlightDiv.style.width = width + 'px';
                        highlightDiv.style.height = height + 'px';
                        highlightDiv.style.background = HIGHLIGHT_CONFIG.defaultColor;
                        highlightDiv.style.border = `2px solid ${HIGHLIGHT_CONFIG.borderColor}`;
                        highlightDiv.setAttribute('data-title', area.title);
                        highlightDiv.title = area.title;
                        
                        overlay.appendChild(highlightDiv);
                    }
                    break;
                case 'circle':
                    if (coordsParts.length === 3) {
                        const cx = Math.round(coordsParts[0] * scaleX);
                        const cy = Math.round(coordsParts[1] * scaleY);
                        const r = Math.round(coordsParts[2] * Math.min(scaleX, scaleY));
                        
                        const highlightDiv = document.createElement('div');
                        highlightDiv.className = 'highlight-area';
                        highlightDiv.style.left = (cx - r) + 'px';
                        highlightDiv.style.top = (cy - r) + 'px';
                        highlightDiv.style.width = (r * 2) + 'px';
                        highlightDiv.style.height = (r * 2) + 'px';
                        highlightDiv.style.borderRadius = '50%';
                        highlightDiv.style.background = HIGHLIGHT_CONFIG.defaultColor;
                        highlightDiv.style.border = `2px solid ${HIGHLIGHT_CONFIG.borderColor}`;
                        highlightDiv.title = area.title;
                        
                        overlay.appendChild(highlightDiv);
                    }
                    break;
                case 'poly':
                    if (coordsParts.length >= 6) {
                        let minX = coordsParts[0], maxX = coordsParts[0];
                        let minY = coordsParts[1], maxY = coordsParts[1];
                        for (let i = 2; i < coordsParts.length; i += 2) {
                            minX = Math.min(minX, coordsParts[i]);
                            maxX = Math.max(maxX, coordsParts[i]);
                            minY = Math.min(minY, coordsParts[i+1]);
                            maxY = Math.max(maxY, coordsParts[i+1]);
                        }
                        left = Math.round(minX * scaleX);
                        top = Math.round(minY * scaleY);
                        width = Math.round((maxX - minX) * scaleX);
                        height = Math.round((maxY - minY) * scaleY);
                        
                        const highlightDiv = document.createElement('div');
                        highlightDiv.className = 'highlight-area';
                        highlightDiv.style.left = left + 'px';
                        highlightDiv.style.top = top + 'px';
                        highlightDiv.style.width = width + 'px';
                        highlightDiv.style.height = height + 'px';
                        highlightDiv.style.background = HIGHLIGHT_CONFIG.defaultColor;
                        highlightDiv.style.border = `2px solid ${HIGHLIGHT_CONFIG.borderColor}`;
                        highlightDiv.style.opacity = '0.5';
                        highlightDiv.title = area.title;
                        
                        overlay.appendChild(highlightDiv);
                    }
                    break;
            }
        });
        
        if (overlay.children.length > 0) {
            wrapper.style.position = 'relative';
            wrapper.appendChild(overlay);
            currentHighlightOverlay = overlay;
        }
    }
    
    function createClickableAreas(pageId, imgElement, mapElement) {
        if (!imgElement || !mapElement) {
            console.error('❌ imgElement atau mapElement null');
            return;
        }
        
        // Filter area untuk page ini DAN area ALL (universal)
        const areasForPage = klikData.filter(area => {
            const isActive = String(area.is_active || '').toUpperCase();
            const isValidActive = isActive === 'TRUE' || isActive === 'YES' || isActive === '1';
            
            // Area dengan page_id = current page ATAU page_id = "ALL"
            const isValidPage = (area.page_id === pageId) || (area.page_id === 'ALL');
            
            return isValidPage && isValidActive;
        });
        
        console.log(`📍 Area untuk page "${pageId}" + ALL: ${areasForPage.length} area ditemukan`);
        
        if (areasForPage.length === 0) {
            console.warn(`⚠️ Tidak ada area klik untuk page "${pageId}"`);
        }
        
        const currentWidth = imgElement.clientWidth;
        const currentHeight = imgElement.clientHeight;
        
        console.log(`📐 Ukuran gambar saat ini: ${currentWidth} x ${currentHeight}`);
        
        if (currentWidth === 0 || currentHeight === 0) {
            console.warn('⚠️ Ukuran gambar 0, tunggu load');
            return;
        }
        
        // Gunakan dimensi asli dari gambar
        const originalWidth = imgElement.naturalWidth || currentWidth;
        const originalHeight = imgElement.naturalHeight || currentHeight;
        const scaleX = currentWidth / originalWidth;
        const scaleY = currentHeight / originalHeight;
        
        console.log(`📏 Scale: ${scaleX.toFixed(3)} x ${scaleY.toFixed(3)} (Original: ${originalWidth}x${originalHeight})`);
        
        // Kosongkan map
        mapElement.innerHTML = '';
        
        // Simpan area untuk highlight (yang show_highlight = ON)
        const highlightAreas = [];
        
        // Area dari Google Sheet (termasuk ALL)
        areasForPage.forEach((area, idx) => {
            console.log(`📌 Area ${idx+1}: ${area.title} | shape: ${area.shape} | coords: ${area.coords} | page_id: ${area.page_id}`);
            
            if (!area.coords || area.coords.trim() === '') {
                console.warn(`⚠️ Area ${area.title} tidak memiliki koordinat`);
                return;
            }
            
            const coordsParts = area.coords.split(',').map(Number);
            let scaledCoords = '';
            
            switch(area.shape) {
                case 'rect':
                    if (coordsParts.length === 4) {
                        scaledCoords = `${Math.round(coordsParts[0] * scaleX)},${Math.round(coordsParts[1] * scaleY)},${Math.round(coordsParts[2] * scaleX)},${Math.round(coordsParts[3] * scaleY)}`;
                        console.log(`  → Rect scaled: ${scaledCoords}`);
                    }
                    break;
                case 'circle':
                    if (coordsParts.length === 3) {
                        scaledCoords = `${Math.round(coordsParts[0] * scaleX)},${Math.round(coordsParts[1] * scaleY)},${Math.round(coordsParts[2] * Math.min(scaleX, scaleY))}`;
                    }
                    break;
                case 'poly':
                    const scaledPoints = [];
                    for (let i = 0; i < coordsParts.length; i += 2) {
                        if (i + 1 < coordsParts.length) {
                            scaledPoints.push(Math.round(coordsParts[i] * scaleX));
                            scaledPoints.push(Math.round(coordsParts[i+1] * scaleY));
                        }
                    }
                    scaledCoords = scaledPoints.join(',');
                    break;
                default:
                    console.warn(`⚠️ Unknown shape: ${area.shape}`);
                    return;
            }
            
            if (!scaledCoords) {
                console.warn(`⚠️ Gagal membuat koordinat untuk ${area.title}`);
                return;
            }
            
            const areaElement = document.createElement('area');
            areaElement.setAttribute('shape', area.shape);
            areaElement.setAttribute('coords', scaledCoords);
            areaElement.setAttribute('title', area.title);
            areaElement.setAttribute('alt', area.title);
            areaElement.style.cursor = 'pointer';
            
            if (area.target_page && area.target_page !== '') {
                areaElement.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    console.log(`🔘 Diklik: ${area.title} → target: ${area.target_page}`);
                    
                    // Cek apakah target_page adalah URL
                    if (area.target_page.startsWith('http://') || area.target_page.startsWith('https://')) {
                        window.open(area.target_page, '_blank');
                    } else if (pagesData.find(p => p.page_id === area.target_page)) {
                        currentPageId = area.target_page;
                        renderPage();
                    } else {
                        console.warn(`⚠️ Target page "${area.target_page}" tidak ditemukan di sheet page`);
                        alert(`Halaman "${area.target_page}" belum tersedia`);
                    }
                });
            }
            
            mapElement.appendChild(areaElement);
            
            // Cek apakah area ini perlu highlight (show_highlight = ON/TRUE)
            const showHighlight = String(area.show_highlight || '').toUpperCase();
            if (showHighlight === 'ON' || showHighlight === 'TRUE' || showHighlight === 'YES') {
                highlightAreas.push(area);
            }
        });
        
        console.log(`✅ Total area dibuat: ${mapElement.children.length}`);
        imgElement.setAttribute('usemap', '#dynamicMap');
        
        // Tampilkan highlight overlay untuk area yang membutuhkan
        if (highlightAreas.length > 0) {
            showHighlightOverlay(highlightAreas, imgElement, scaleX, scaleY);
        }
        
        if (areasForPage.length > 0) {
            console.log('✅ Area klik berhasil dibuat! Coba klik pada area yang sesuai.');
        }
    }
    
    // ============================================================
    // FUNGSI RENDER HALAMAN
    // ============================================================
    function setSidebarHeight(imgElement) {
        const sidebar = document.getElementById('pokjaSidebar');
        if (sidebar && imgElement && imgElement.clientHeight > 0) {
            sidebar.style.height = imgElement.clientHeight + 'px';
        }
    }
    
    function getImageUrl(imageId) {
        if (!imageId) return '';
        if (imageId.startsWith('http://') || imageId.startsWith('https://')) {
            return imageId;
        }
        return `https://lh3.googleusercontent.com/d/${imageId}`;
    }
    
    function renderPage() {
        const topMenus = pagesData.filter(p => p.is_active_top === 'TRUE').sort((a,b) => parseInt(a.order) - parseInt(b.order));
        const sideMenus = pagesData.filter(p => p.is_active_sidebar === 'TRUE').sort((a,b) => parseInt(a.order) - parseInt(b.order));
        
        const currentPage = pagesData.find(p => p.page_id === currentPageId);
        if (!currentPage) {
            document.getElementById('app').innerHTML = '<div class="loading">❌ Halaman tidak ditemukan</div>';
            return;
        }
        
        const imageUrl = getImageUrl(currentPage.image_id || currentPage.image_url);
        
        let activeTopId = null;
        if (currentPage.menu_type === 'sidebar') {
            activeTopId = 'realisasi';
        } else {
            activeTopId = currentPage.page_id;
        }
        
        let activeSideId = null;
        if (currentPage.menu_type === 'sidebar') {
            activeSideId = currentPage.page_id;
        } else {
            activeSideId = null;
        }
        
        const html = `
            <div class="nav-section">
                <div class="page-nav">
                    ${topMenus.map(menu => `
                        <a data-page="${menu.page_id}" class="${activeTopId === menu.page_id ? 'active' : ''}">
                            ${menu.label_menu}
                        </a>
                    `).join('')}
                </div>
            </div>
            <div class="content-row">
                <div class="image-wrapper">
                    <img src="${imageUrl}" alt="${currentPage.title}" id="mainImage">
                    <map name="dynamicMap" id="dynamicMap"></map>
                </div>
                <div class="pokja-sidebar" id="pokjaSidebar">
                    <div class="pokja-list">
                        ${sideMenus.map(menu => `
                            <div class="pokja-btn ${activeSideId === menu.page_id ? 'active' : ''}" data-page="${menu.page_id}">
                                <div class="horizontal-text">${menu.label_menu}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        
        // Event listener untuk top menu
        document.querySelectorAll('.page-nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const pageId = link.getAttribute('data-page');
                if (pageId) {
                    console.log(`🔄 Pindah ke halaman: ${pageId}`);
                    currentPageId = pageId;
                    renderPage();
                }
            });
        });
        
        // Event listener untuk sidebar menu
        document.querySelectorAll('.pokja-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const pageId = btn.getAttribute('data-page');
                if (pageId) {
                    console.log(`🔄 Pindah ke halaman (sidebar): ${pageId}`);
                    currentPageId = pageId;
                    renderPage();
                }
            });
        });
        
        const img = document.getElementById('mainImage');
        const mapEl = document.getElementById('dynamicMap');
        
        img.onerror = function() {
            console.error(`❌ Gambar gagal dimuat: ${imageUrl}`);
            this.alt = 'Gambar tidak tersedia';
            this.style.backgroundColor = '#ccc';
            this.style.minHeight = '200px';
        };
        
        // Buat area klik setelah gambar load
        if (img.complete && img.naturalHeight !== 0) {
            console.log('🖼️ Gambar sudah complete, langsung buat area');
            createClickableAreas(currentPageId, img, mapEl);
            setSidebarHeight(img);
        } else {
            img.addEventListener('load', () => {
                console.log('🖼️ Gambar loaded, dimensi:', img.naturalWidth, 'x', img.naturalHeight);
                createClickableAreas(currentPageId, img, mapEl);
                setSidebarHeight(img);
            });
        }
        
        // Resize handler
        let resizeTimeout;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimeout);
            resizeTimeout = setTimeout(() => {
                if (img && img.clientHeight > 0) {
                    console.log('📱 Resize detected, update areas');
                    createClickableAreas(currentPageId, img, mapEl);
                    setSidebarHeight(img);
                }
            }, 100);
        });
    }
    
    // ============================================================
    // INITIALIZATION
    // ============================================================
    async function init() {
        console.log('🚀 Initializing website...');
        const success = await loadAllData();
        if (success && pagesData.length > 0) {
            renderPage();
        } else {
            let errorMsg = '❌ Gagal memuat data. Periksa:<br><br>';
            errorMsg += '1. <b>Sheet sudah dipublish?</b> (File → Share → Publish to web → CSV)<br>';
            errorMsg += '2. <b>Sheet "page"</b> sudah diisi minimal 1 baris?<br>';
            errorMsg += '3. <b>Pastikan sheet bisa diakses publik</b><br>';
            errorMsg += '<br><b>Tekan F12 untuk melihat detail error di console</b>';
            document.getElementById('app').innerHTML = `<div class="loading"><div class="error-message">${errorMsg}</div></div>`;
        }
    }
    
    // Jalankan init
    init();
</script>
</body>
</html>
