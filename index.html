<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <meta name="description" content="CDK I Blora 2026 - Peta Interaktif">
    <title>CDK I Blora 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #2d4a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        .main-wrapper {
            max-width: 1600px;
            width: 100%;
            background: #1a3a1a;
            border-radius: 20px;
            padding: 10px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .nav-section {
            background: transparent;
            margin-bottom: 12px;
            display: flex;
            justify-content: flex-start;
            padding: 0 4px;
            overflow-x: auto;
            scrollbar-width: thin;
        }

        .page-nav {
            display: flex;
            gap: 6px;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(10px);
            padding: 6px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }

        .page-nav a {
            background: transparent;
            color: #e0e0e0;
            font-size: 18px;
            font-weight: 500;
            padding: 6px 16px;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            white-space: nowrap;
            display: inline-block;
        }

        .page-nav a:hover, .page-nav a.active {
            background: #ffd700;
            color: #1a3a1a;
            transform: translateY(-2px);
        }

        .content-row {
            display: flex;
            gap: 0;
            align-items: stretch;
        }

        .image-wrapper {
            flex: 1;
            min-width: 0;
            position: relative;
            background: #e8f0e3;
            border-radius: 16px 0 0 16px;
            overflow: hidden;
            text-align: center;
            line-height: 0;
        }

        .image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.3s ease;
        }

        .image-wrapper img.loading {
            opacity: 0.5;
        }

        .highlight-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .highlight-area {
            position: absolute;
            background: rgba(0, 0, 0, 0.25);
            border: 2px solid #000000;
            box-sizing: border-box;
            transition: all 0.2s ease;
            pointer-events: none;
            cursor: pointer;
        }

        .highlight-area:hover {
            background: rgba(255, 215, 0, 0.3);
            border-color: #ffd700;
        }

        .pokja-sidebar {
            width: 45px;
            background: linear-gradient(135deg, #0d3b4f 0%, #0a2e3f 100%);
            border-radius: 0 16px 16px 0;
            border-left: 2px solid #00bcd4;
            display: flex;
            flex-direction: column;
        }

        .pokja-list {
            display: flex;
            flex-direction: column;
            flex: 1;
            justify-content: center;
        }

        .pokja-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 188, 212, 0.15);
            color: #b2ebf2;
            text-decoration: none;
            transition: all 0.25s ease;
            cursor: pointer;
            flex: 1;
            min-height: 70px;
            position: relative;
        }

        .pokja-btn:not(:last-child) {
            border-bottom: 1px solid rgba(0, 188, 212, 0.35);
        }

        .pokja-btn:hover, .pokja-btn.active {
            background: #ffd700;
            color: #1a3a1a;
            transform: scale(1.05);
            z-index: 1;
        }

        .horizontal-text {
            display: inline-block;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            transform: rotate(90deg);
        }

        .loading {
            text-align: center;
            padding: 50px;
            color: white;
            font-size: 18px;
        }

        .loading-spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #ffd700;
            animation: spin 1s ease-in-out infinite;
            margin-bottom: 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(255,0,0,0.2);
            border: 2px solid #ff4444;
            border-radius: 10px;
            padding: 20px;
            margin: 20px;
            color: white;
        }

        .error-message h3 {
            margin-bottom: 10px;
        }

        /* ============================================ */
        /* POPUP STYLES - IMPROVED */
        /* ============================================ */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup-container {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 85%;
            max-width: 1400px;
            height: 85%;
            max-height: 900px;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            z-index: 1001;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                transform: translate(-50%, -50%) scale(0.9);
                opacity: 0;
            }
            to {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
        }

        .popup-header {
            padding: 12px 20px;
            background: linear-gradient(135deg, #1a3a1a 0%, #0d2e0d 100%);
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px 16px 0 0;
            flex-shrink: 0;
        }

        .popup-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .popup-toolbar {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .popup-btn {
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .popup-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .popup-btn:active {
            transform: scale(0.95);
        }

        .popup-btn-close {
            background: rgba(220, 53, 69, 0.8);
        }

        .popup-btn-close:hover {
            background: rgba(220, 53, 69, 1);
        }

        .zoom-value {
            background: rgba(255, 255, 255, 0.2);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            min-width: 55px;
            text-align: center;
        }

        .popup-content-wrapper {
            flex: 1;
            overflow: auto;
            padding: 0;
            position: relative;
            background: #f5f5f5;
        }

        .popup-content {
            transform-origin: top left;
            transition: transform 0.2s ease;
            width: 100%;
            height: 100%;
        }

        .popup-content iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        .popup-content img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto;
        }

        .popup-error {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100%;
            padding: 40px;
            text-align: center;
        }

        .popup-error h3 {
            margin: 20px 0 10px;
            color: #333;
        }

        .popup-error p {
            color: #666;
            margin-bottom: 20px;
        }

        .popup-error button {
            padding: 10px 20px;
            background: #1a3a1a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, #e0e0e0 25%, #f0f0f0 50%, #e0e0e0 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }

        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        /* Responsive untuk mobile */
        @media (max-width: 768px) {
            .popup-container {
                width: 95%;
                height: 90%;
            }
            
            .popup-btn span:not(.emoji) {
                display: none;
            }
            
            .popup-btn {
                padding: 6px 10px;
            }
            
            .zoom-value {
                min-width: 45px;
                font-size: 12px;
            }

            .page-nav a {
                font-size: 14px;
                padding: 4px 12px;
            }

            .horizontal-text {
                font-size: 12px;
            }
        }

        /* Touch device optimizations */
        @media (hover: none) {
            .pokja-btn:hover {
                transform: none;
            }
            
            .highlight-area {
                background: rgba(255, 215, 0, 0.2);
            }
        }
    </style>
</head>
<body>
<div class="main-wrapper" id="app">
    <div class="loading">
        <div class="loading-spinner"></div>
        <div>⏳ Memuat data dari Google Sheet...</div>
    </div>
</div>

<script>
    // ============================================================
    // KONFIGURASI
    // ============================================================
    const CONFIG = {
        SHEET_ID: '16iACO_haYmDeOFGrMAig-WLiU-n2pVRtnjr8EGkOPg0',
        SHEET_GID: {
            page: '0',
            klik: '475336072'
        },
        CACHE_TTL: 3600000, // 1 hour cache
        DEBUG: false, // Set ke true untuk development
        HIGHLIGHT_CONFIG: {
            defaultColor: 'rgba(0, 0, 0, 0.25)',
            hoverColor: 'rgba(255, 215, 0, 0.3)',
            borderColor: '#000000'
        }
    };

    // Data storage
    let pagesData = [];
    let klikData = [];
    let currentPageId = 'index';
    let currentHighlightOverlay = null;
    let currentPopup = null;
    let resizeHandler = null;
    
    // ============================================================
    // HELPER FUNCTIONS
    // ============================================================
    
    function log(...args) {
        if (CONFIG.DEBUG) {
            console.log(...args);
        }
    }
    
    function sanitizeHTML(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
    
    function validateURL(url) {
        if (!url) return false;
        const allowedProtocols = ['http:', 'https:'];
        try {
            const urlObj = new URL(url);
            return allowedProtocols.includes(urlObj.protocol);
        } catch (e) {
            return false;
        }
    }
    
    // ============================================================
    // CACHE MANAGEMENT
    // ============================================================
    
    class CacheManager {
        constructor(ttl) {
            this.ttl = ttl;
        }
        
        set(key, data) {
            const item = {
                data: data,
                timestamp: Date.now()
            };
            localStorage.setItem(key, JSON.stringify(item));
        }
        
        get(key) {
            const itemStr = localStorage.getItem(key);
            if (!itemStr) return null;
            
            try {
                const item = JSON.parse(itemStr);
                if (Date.now() - item.timestamp > this.ttl) {
                    localStorage.removeItem(key);
                    return null;
                }
                return item.data;
            } catch (e) {
                return null;
            }
        }
        
        clear(key) {
            localStorage.removeItem(key);
        }
    }
    
    const cacheManager = new CacheManager(CONFIG.CACHE_TTL);
    
    // ============================================================
    // FUNGSI KONVERSI URL UNTUK EMBED
    // ============================================================
    
    function getEmbedUrl(url) {
        if (!url) return '';
        
        // YouTube - format youtu.be
        if (url.includes('youtu.be')) {
            const videoId = url.split('youtu.be/')[1].split('?')[0];
            return `https://www.youtube.com/embed/${videoId}?autoplay=0&rel=0&modestbranding=1`;
        }
        
        // YouTube - format youtube.com/watch
        if (url.includes('youtube.com/watch')) {
            const urlParams = new URLSearchParams(url.split('?')[1]);
            const videoId = urlParams.get('v');
            if (videoId) {
                return `https://www.youtube.com/embed/${videoId}?autoplay=0&rel=0&modestbranding=1`;
            }
        }
        
        // YouTube - format youtube.com/embed
        if (url.includes('youtube.com/embed')) {
            return url;
        }
        
        // Google Drive File
        if (url.includes('drive.google.com/file')) {
            const match = url.match(/\/d\/(.+?)(\/|$)/);
            if (match) {
                const fileId = match[1];
                return `https://drive.google.com/file/d/${fileId}/preview`;
            }
        }
        
        // Google Drive open?id= format
        if (url.includes('drive.google.com/open')) {
            const fileId = url.split('id=')[1].split('&')[0];
            if (fileId) {
                return `https://drive.google.com/file/d/${fileId}/preview`;
            }
        }
        
        // Google Docs
        if (url.includes('docs.google.com/document')) {
            const match = url.match(/\/d\/(.+?)(\/|$)/);
            if (match) {
                const docId = match[1];
                return `https://docs.google.com/document/d/${docId}/preview`;
            }
        }
        
        // Google Sheets
        if (url.includes('docs.google.com/spreadsheets')) {
            const match = url.match(/\/d\/(.+?)(\/|$)/);
            if (match) {
                const sheetId = match[1];
                return `https://docs.google.com/spreadsheets/d/${sheetId}/preview`;
            }
        }
        
        // Google Slides
        if (url.includes('docs.google.com/presentation')) {
            const match = url.match(/\/d\/(.+?)(\/|$)/);
            if (match) {
                const slideId = match[1];
                return `https://docs.google.com/presentation/d/${slideId}/preview`;
            }
        }
        
        // PDF langsung
        if (url.toLowerCase().endsWith('.pdf')) {
            return url;
        }
        
        // Gambar
        if (url.match(/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i)) {
            return url;
        }
        
        return url;
    }
    
    function getContentType(url) {
        if (url.includes('youtube.com/embed') || url.includes('youtu.be')) return 'youtube';
        if (url.match(/\.(jpg|jpeg|png|gif|webp|svg|bmp)$/i)) return 'image';
        if (url.toLowerCase().endsWith('.pdf')) return 'pdf';
        return 'iframe';
    }
    
    // ============================================================
    // FUNGSI POPUP - IMPROVED
    // ============================================================
    
    function openPopup(url, title) {
        if (!validateURL(url)) {
            console.error('Invalid URL:', url);
            alert('URL tidak valid');
            return;
        }
        
        closePopup();
        
        const embedUrl = getEmbedUrl(url);
        log('Original URL:', url);
        log('Embed URL:', embedUrl);
        
        // Create overlay with animation
        const overlay = document.createElement('div');
        overlay.className = 'popup-overlay';
        
        const container = document.createElement('div');
        container.className = 'popup-container';
        
        // Header
        const header = document.createElement('div');
        header.className = 'popup-header';
        
        const titleSpan = document.createElement('div');
        titleSpan.className = 'popup-title';
        titleSpan.innerHTML = `📋 ${sanitizeHTML(title || 'Popup')}`;
        
        const toolbar = document.createElement('div');
        toolbar.className = 'popup-toolbar';
        
        // Zoom controls
        const zoomOutBtn = createButton('🔍', '-', 'Zoom Out (Ctrl + -)');
        const zoomValue = document.createElement('span');
        zoomValue.className = 'zoom-value';
        zoomValue.textContent = '100%';
        const zoomInBtn = createButton('🔍', '+', 'Zoom In (Ctrl + +)');
        const resetBtn = createButton('⟳', '100%', 'Reset Zoom (Ctrl + 0)');
        const newTabBtn = createButton('🔗', 'Tab Baru', 'Buka di Tab Baru');
        const fullscreenBtn = createButton('⤢', 'Fullscreen', 'Fullscreen');
        const closeBtn = createButton('✕', 'Tutup', 'Tutup (ESC)');
        closeBtn.classList.add('popup-btn-close');
        
        toolbar.appendChild(zoomOutBtn);
        toolbar.appendChild(zoomValue);
        toolbar.appendChild(zoomInBtn);
        toolbar.appendChild(resetBtn);
        toolbar.appendChild(newTabBtn);
        toolbar.appendChild(fullscreenBtn);
        toolbar.appendChild(closeBtn);
        
        header.appendChild(titleSpan);
        header.appendChild(toolbar);
        
        // Content wrapper
        const contentWrapper = document.createElement('div');
        contentWrapper.className = 'popup-content-wrapper';
        
        const contentDiv = document.createElement('div');
        contentDiv.className = 'popup-content';
        
        // Determine content type
        const contentType = getContentType(embedUrl);
        let contentElement;
        
        if (contentType === 'image') {
            contentElement = document.createElement('img');
            contentElement.src = embedUrl;
            contentElement.alt = sanitizeHTML(title) || 'Gambar';
            contentElement.style.maxWidth = '100%';
            contentElement.style.height = 'auto';
            contentElement.onerror = () => {
                showPopupError(contentDiv, 'Gagal memuat gambar');
            };
        } else {
            contentElement = document.createElement('iframe');
            contentElement.src = embedUrl;
            contentElement.title = sanitizeHTML(title) || 'Konten';
            contentElement.allow = "fullscreen";
            contentElement.style.width = '100%';
            contentElement.style.height = '100%';
            contentElement.style.border = 'none';
            contentElement.setAttribute('frameborder', '0');
            contentElement.setAttribute('allowfullscreen', 'true');
            contentElement.setAttribute('allow', 'autoplay; fullscreen');
            
            // Set timeout for iframe loading
            const timeoutId = setTimeout(() => {
                if (contentElement && !contentElement.__loaded) {
                    showPopupError(contentDiv, 'Konten membutuhkan waktu lama untuk dimuat. Pastikan koneksi internet stabil.');
                }
            }, 10000);
            
            contentElement.onload = () => {
                contentElement.__loaded = true;
                clearTimeout(timeoutId);
            };
        }
        
        contentDiv.appendChild(contentElement);
        contentWrapper.appendChild(contentDiv);
        
        container.appendChild(header);
        container.appendChild(contentWrapper);
        overlay.appendChild(container);
        
        document.body.appendChild(overlay);
        
        // Store reference
        currentPopup = {
            overlay,
            container,
            contentDiv,
            contentElement,
            zoomValue,
            currentZoom: 100,
            originalUrl: url,
            embedUrl: embedUrl
        };
        
        // Zoom functions
        function updateZoom() {
            const zoom = currentPopup.currentZoom / 100;
            currentPopup.contentDiv.style.transform = `scale(${zoom})`;
            
            if (currentPopup.contentElement.tagName === 'IFRAME') {
                currentPopup.contentDiv.style.width = `${100 / zoom}%`;
                currentPopup.contentDiv.style.height = `${100 / zoom}%`;
            }
            
            currentPopup.zoomValue.textContent = `${currentPopup.currentZoom}%`;
        }
        
        function zoomIn() {
            if (currentPopup.currentZoom < 200) {
                currentPopup.currentZoom = Math.min(currentPopup.currentZoom + 10, 200);
                updateZoom();
            }
        }
        
        function zoomOut() {
            if (currentPopup.currentZoom > 50) {
                currentPopup.currentZoom = Math.max(currentPopup.currentZoom - 10, 50);
                updateZoom();
            }
        }
        
        function resetZoom() {
            currentPopup.currentZoom = 100;
            updateZoom();
        }
        
        // Event listeners
        zoomInBtn.onclick = zoomIn;
        zoomOutBtn.onclick = zoomOut;
        resetBtn.onclick = resetZoom;
        
        newTabBtn.onclick = () => {
            if (validateURL(currentPopup.originalUrl)) {
                window.open(currentPopup.originalUrl, '_blank');
            }
        };
        
        fullscreenBtn.onclick = () => {
            const elem = container;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
        };
        
        const closePopupHandler = () => closePopup();
        closeBtn.onclick = closePopupHandler;
        overlay.onclick = (e) => {
            if (e.target === overlay) closePopupHandler();
        };
        
        // Keyboard shortcuts
        const keyboardHandler = (e) => {
            if (!currentPopup) return;
            
            switch(e.key) {
                case 'Escape':
                    closePopupHandler();
                    break;
                case '+':
                case '=':
                    if (e.ctrlKey) {
                        e.preventDefault();
                        zoomIn();
                    }
                    break;
                case '-':
                    if (e.ctrlKey) {
                        e.preventDefault();
                        zoomOut();
                    }
                    break;
                case '0':
                    if (e.ctrlKey) {
                        e.preventDefault();
                        resetZoom();
                    }
                    break;
            }
        };
        
        document.addEventListener('keydown', keyboardHandler);
        currentPopup.keyboardHandler = keyboardHandler;
        
        updateZoom();
    }
    
    function createButton(emoji, text, title) {
        const btn = document.createElement('button');
        btn.className = 'popup-btn';
        btn.innerHTML = `<span class="emoji">${emoji}</span><span>${text}</span>`;
        btn.title = title;
        return btn;
    }
    
    function showPopupError(container, message) {
        if (!container) return;
        
        const errorDiv = document.createElement('div');
        errorDiv.className = 'popup-error';
        errorDiv.innerHTML = `
            <div style="font-size: 48px;">⚠️</div>
            <h3>Gagal Memuat Konten</h3>
            <p>${sanitizeHTML(message)}</p>
            <button onclick="this.closest('.popup-container')?.parentElement?.remove()">Tutup</button>
        `;
        
        container.innerHTML = '';
        container.appendChild(errorDiv);
    }
    
    function closePopup() {
        if (currentPopup) {
            if (currentPopup.keyboardHandler) {
                document.removeEventListener('keydown', currentPopup.keyboardHandler);
            }
            currentPopup.overlay.remove();
            currentPopup = null;
        }
    }
    
    // ============================================================
    // FUNGSI BACA GOOGLE SHEET - IMPROVED
    // ============================================================
    
    async function fetchSheetAsJSON(gid) {
        const cacheKey = `sheet_${gid}`;
        const cachedData = cacheManager.get(cacheKey);
        
        if (cachedData) {
            log(`Using cached data for gid ${gid}`);
            return cachedData;
        }
        
        const url = `https://docs.google.com/spreadsheets/d/${CONFIG.SHEET_ID}/gviz/tq?tqx=out:json&gid=${gid}`;
        
        try {
            log(`Fetching sheet gid ${gid}...`);
            const response = await fetch(url);
            
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            
            const text = await response.text();
            // Remove Google's callback wrapper
            const jsonText = text.substring(47, text.length - 2);
            const jsonData = JSON.parse(jsonText);
            
            if (!jsonData.table || !jsonData.table.rows) {
                throw new Error('Invalid JSON structure');
            }
            
            // Parse to array of objects
            const rows = jsonData.table.rows.map(row => {
                const obj = {};
                jsonData.table.cols.forEach((col, idx) => {
                    let value = row.c[idx]?.v;
                    if (value === undefined || value === null) value = '';
                    obj[col.label] = value;
                });
                return obj;
            });
            
            log(`✅ Parsed ${rows.length} rows from sheet gid ${gid}`);
            if (rows.length > 0) {
                log('First row sample:', rows[0]);
            }
            
            // Cache the data
            cacheManager.set(cacheKey, rows);
            
            return rows;
        } catch (error) {
            console.error(`❌ Error fetching sheet gid ${gid}:`, error);
            return [];
        }
    }
    
    async function loadAllData() {
        try {
            log('Loading data from Google Sheet...');
            
            const [pageData, klikDataRaw] = await Promise.all([
                fetchSheetAsJSON(CONFIG.SHEET_GID.page),
                fetchSheetAsJSON(CONFIG.SHEET_GID.klik)
            ]);
            
            pagesData = pageData;
            klikData = klikDataRaw;
            
            log(`Pages loaded: ${pagesData.length} rows`);
            log(`Klik areas loaded: ${klikData.length} rows`);
            
            if (klikData.length === 0) {
                console.warn('⚠️ Tidak ada data di sheet klik!');
            }
            
            if (pagesData.length === 0) {
                console.error('❌ No data in "page" sheet.');
                return false;
            }
            
            return true;
        } catch (error) {
            console.error('❌ Error loading data:', error);
            return false;
        }
    }
    
    // ============================================================
    // FUNGSI MEMBUAT AREA KLIK - IMPROVED
    // ============================================================
    
    function validateCoords(coords, shape) {
        if (!coords || coords.trim() === '') return false;
        const parts = coords.split(',').map(Number);
        
        switch(shape) {
            case 'rect':
                return parts.length === 4 && parts.every(v => !isNaN(v));
            case 'circle':
                return parts.length === 3 && parts.every(v => !isNaN(v));
            case 'poly':
                return parts.length >= 6 && parts.length % 2 === 0 && parts.every(v => !isNaN(v));
            default:
                return false;
        }
    }
    
    function showHighlightOverlay(areas, imgElement, referenceWidth, referenceHeight) {
        if (currentHighlightOverlay) {
            currentHighlightOverlay.remove();
        }
        
        const wrapper = document.querySelector('.image-wrapper');
        if (!wrapper) return;
        
        const currentWidth = imgElement.clientWidth;
        const currentHeight = imgElement.clientHeight;
        
        if (currentWidth === 0 || currentHeight === 0) {
            log('Cannot show overlay: image not loaded');
            return;
        }
        
        const scaleX = currentWidth / referenceWidth;
        const scaleY = currentHeight / referenceHeight;
        
        const overlay = document.createElement('div');
        overlay.className = 'highlight-overlay';
        
        areas.forEach(area => {
            if (!validateCoords(area.coords, area.shape)) return;
            
            const coordsParts = area.coords.split(',').map(Number);
            let left, top, width, height;
            
            switch(area.shape) {
                case 'rect':
                    if (coordsParts.length === 4) {
                        left = Math.round(coordsParts[0] * scaleX);
                        top = Math.round(coordsParts[1] * scaleY);
                        width = Math.round((coordsParts[2] - coordsParts[0]) * scaleX);
                        height = Math.round((coordsParts[3] - coordsParts[1]) * scaleY);
                        
                        if (width > 0 && height > 0) {
                            const highlightDiv = createHighlightDiv(left, top, width, height, area.title);
                            overlay.appendChild(highlightDiv);
                        }
                    }
                    break;
                case 'circle':
                    if (coordsParts.length === 3) {
                        const cx = Math.round(coordsParts[0] * scaleX);
                        const cy = Math.round(coordsParts[1] * scaleY);
                        const r = Math.round(coordsParts[2] * Math.min(scaleX, scaleY));
                        
                        if (r > 0) {
                            const highlightDiv = createHighlightDiv(cx - r, cy - r, r * 2, r * 2, area.title);
                            highlightDiv.style.borderRadius = '50%';
                            overlay.appendChild(highlightDiv);
                        }
                    }
                    break;
                case 'poly':
                    if (coordsParts.length >= 6) {
                        let minX = coordsParts[0], maxX = coordsParts[0];
                        let minY = coordsParts[1], maxY = coordsParts[1];
                        for (let i = 2; i < coordsParts.length; i += 2) {
                            minX = Math.min(minX, coordsParts[i]);
                            maxX = Math.max(maxX, coordsParts[i]);
                            minY = Math.min(minY, coordsParts[i+1]);
                            maxY = Math.max(maxY, coordsParts[i+1]);
                        }
                        left = Math.round(minX * scaleX);
                        top = Math.round(minY * scaleY);
                        width = Math.round((maxX - minX) * scaleX);
                        height = Math.round((maxY - minY) * scaleY);
                        
                        if (width > 0 && height > 0) {
                            const highlightDiv = createHighlightDiv(left, top, width, height, area.title);
                            highlightDiv.style.opacity = '0.5';
                            overlay.appendChild(highlightDiv);
                        }
                    }
                    break;
            }
        });
        
        if (overlay.children.length > 0) {
            wrapper.style.position = 'relative';
            wrapper.appendChild(overlay);
            currentHighlightOverlay = overlay;
        }
    }
    
    function createHighlightDiv(left, top, width, height, title) {
        const div = document.createElement('div');
        div.className = 'highlight-area';
        div.style.left = left + 'px';
        div.style.top = top + 'px';
        div.style.width = width + 'px';
        div.style.height = height + 'px';
        div.style.background = CONFIG.HIGHLIGHT_CONFIG.defaultColor;
        div.style.border = `2px solid ${CONFIG.HIGHLIGHT_CONFIG.borderColor}`;
        div.title = sanitizeHTML(title);
        return div;
    }
    
    function createClickableAreas(pageId, imgElement, mapElement) {
        if (!imgElement || !mapElement) {
            console.error('❌ imgElement atau mapElement null');
            return;
        }
        
        // Filter area for this page and ALL pages
        const areasForPage = klikData.filter(area => {
            const isActive = String(area.is_active || '').toUpperCase();
            const isValidActive = isActive === 'TRUE' || isActive === 'YES' || isActive === '1';
            const isValidPage = (area.page_id === pageId) || (area.page_id === 'ALL');
            return isValidPage && isValidActive;
        });
        
        log(`Area untuk page "${pageId}" + ALL: ${areasForPage.length} area ditemukan`);
        
        const currentWidth = imgElement.clientWidth;
        const currentHeight = imgElement.clientHeight;
        
        log(`Ukuran gambar tampilan: ${currentWidth} x ${currentHeight}`);
        
        if (currentWidth === 0 || currentHeight === 0) {
            console.warn('⚠️ Ukuran gambar 0, tunggu load');
            return;
        }
        
        const pageInfo = pagesData.find(p => p.page_id === pageId);
        const referenceWidth = parseInt(pageInfo?.original_width) || 1512;
        const referenceHeight = parseInt(pageInfo?.original_height) || 1023;
        
        const scaleX = currentWidth / referenceWidth;
        const scaleY = currentHeight / referenceHeight;
        
        log(`Referensi dari sheet: ${referenceWidth}x${referenceHeight}`);
        log(`Scale: ${scaleX.toFixed(4)} x ${scaleY.toFixed(4)}`);
        
        mapElement.innerHTML = '';
        
        const highlightAreas = [];
        
        areasForPage.forEach((area, idx) => {
            if (!validateCoords(area.coords, area.shape)) {
                console.warn(`⚠️ Area ${area.title} memiliki koordinat tidak valid`);
                return;
            }
            
            log(`Area ${idx+1}: ${area.title} | coords: ${area.coords} | page_id: ${area.page_id}`);
            
            const coordsParts = area.coords.split(',').map(Number);
            let scaledCoords = '';
            
            switch(area.shape) {
                case 'rect':
                    if (coordsParts.length === 4) {
                        scaledCoords = `${Math.round(coordsParts[0] * scaleX)},${Math.round(coordsParts[1] * scaleY)},${Math.round(coordsParts[2] * scaleX)},${Math.round(coordsParts[3] * scaleY)}`;
                    }
                    break;
                case 'circle':
                    if (coordsParts.length === 3) {
                        scaledCoords = `${Math.round(coordsParts[0] * scaleX)},${Math.round(coordsParts[1] * scaleY)},${Math.round(coordsParts[2] * Math.min(scaleX, scaleY))}`;
                    }
                    break;
                case 'poly':
                    const scaledPoints = [];
                    for (let i = 0; i < coordsParts.length; i += 2) {
                        if (i + 1 < coordsParts.length) {
                            scaledPoints.push(Math.round(coordsParts[i] * scaleX));
                            scaledPoints.push(Math.round(coordsParts[i+1] * scaleY));
                        }
                    }
                    scaledCoords = scaledPoints.join(',');
                    break;
            }
            
            if (!scaledCoords) {
                console.warn(`⚠️ Gagal membuat koordinat untuk ${area.title}`);
                return;
            }
            
            const areaElement = document.createElement('area');
            areaElement.setAttribute('shape', area.shape);
            areaElement.setAttribute('coords', scaledCoords);
            areaElement.setAttribute('title', sanitizeHTML(area.title));
            areaElement.setAttribute('alt', sanitizeHTML(area.title));
            areaElement.style.cursor = 'pointer';
            
            const actionType = String(area.action_type || '').toUpperCase();
            const target = area.target_page || '';
            
            if (target && target !== '') {
                areaElement.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    log(`🔘 Diklik: ${area.title} | action: ${actionType || 'internal'} | target: ${target}`);
                    
                    if (actionType === 'POPUP') {
                        if (validateURL(target)) {
                            openPopup(target, area.title);
                        } else {
                            console.error('Invalid popup URL:', target);
                            alert('Link tidak valid');
                        }
                    } else if (actionType === 'URL' && validateURL(target)) {
                        window.open(target, '_blank');
                    } else if (pagesData.find(p => p.page_id === target)) {
                        currentPageId = target;
                        renderPage();
                    } else {
                        console.warn(`⚠️ Target "${target}" tidak dikenali`);
                        alert(`Target "${target}" tidak valid`);
                    }
                });
                
                // Add touch event for mobile
                areaElement.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    areaElement.click();
                });
            }
            
            mapElement.appendChild(areaElement);
            
            const showHighlight = String(area.show_highlight || '').toUpperCase();
            if (showHighlight === 'ON' || showHighlight === 'TRUE' || showHighlight === 'YES') {
                highlightAreas.push(area);
            }
        });
        
        log(`Total area dibuat: ${mapElement.children.length}`);
        imgElement.setAttribute('usemap', '#dynamicMap');
        
        if (highlightAreas.length > 0) {
            showHighlightOverlay(highlightAreas, imgElement, referenceWidth, referenceHeight);
        }
    }
    
    // ============================================================
    // FUNGSI RENDER HALAMAN - IMPROVED
    // ============================================================
    
    function getImageUrl(imageId) {
        if (!imageId) return '';
        // If it's already a full URL
        if (imageId.startsWith('http://') || imageId.startsWith('https://')) {
            return imageId;
        }
        // Google Drive direct link
        return `https://lh3.googleusercontent.com/d/${imageId}`;
    }
    
    function renderPage() {
        const topMenus = pagesData.filter(p => p.is_active_top === 'TRUE').sort((a,b) => parseInt(a.order) - parseInt(b.order));
        const sideMenus = pagesData.filter(p => p.is_active_sidebar === 'TRUE').sort((a,b) => parseInt(a.order) - parseInt(b.order));
        
        const currentPage = pagesData.find(p => p.page_id === currentPageId);
        if (!currentPage) {
            document.getElementById('app').innerHTML = '<div class="loading"><div class="error-message"><h3>❌ Halaman tidak ditemukan</h3><p>Silakan refresh halaman atau hubungi administrator.</p></div></div>';
            return;
        }
        
        const imageUrl = getImageUrl(currentPage.image_id || currentPage.image_url);
        
        let activeTopId = null;
        if (currentPage.menu_type === 'sidebar') {
            activeTopId = 'realisasi';
        } else {
            activeTopId = currentPage.page_id;
        }
        
        let activeSideId = null;
        if (currentPage.menu_type === 'sidebar') {
            activeSideId = currentPage.page_id;
        } else {
            activeSideId = null;
        }
        
        const html = `
            <div class="nav-section">
                <div class="page-nav">
                    ${topMenus.map(menu => `
                        <a data-page="${sanitizeHTML(menu.page_id)}" class="${activeTopId === menu.page_id ? 'active' : ''}">
                            ${sanitizeHTML(menu.label_menu)}
                        </a>
                    `).join('')}
                </div>
            </div>
            <div class="content-row">
                <div class="image-wrapper">
                    <img src="${imageUrl}" alt="${sanitizeHTML(currentPage.title)}" id="mainImage" class="loading">
                    <map name="dynamicMap" id="dynamicMap"></map>
                </div>
                <div class="pokja-sidebar" id="pokjaSidebar">
                    <div class="pokja-list">
                        ${sideMenus.map(menu => `
                            <div class="pokja-btn ${activeSideId === menu.page_id ? 'active' : ''}" data-page="${sanitizeHTML(menu.page_id)}">
                                <div class="horizontal-text">${sanitizeHTML(menu.label_menu)}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
        
        document.getElementById('app').innerHTML = html;
        
        // Attach event listeners
        document.querySelectorAll('.page-nav a').forEach(link => {
            link.addEventListener('click', (e) => {
                e.preventDefault();
                const pageId = link.getAttribute('data-page');
                if (pageId) {
                    log(`Pindah ke halaman: ${pageId}`);
                    currentPageId = pageId;
                    renderPage();
                }
            });
        });
        
        document.querySelectorAll('.pokja-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.preventDefault();
                const pageId = btn.getAttribute('data-page');
                if (pageId) {
                    log(`Pindah ke halaman (sidebar): ${pageId}`);
                    currentPageId = pageId;
                    renderPage();
                }
            });
        });
        
        const img = document.getElementById('mainImage');
        const mapEl = document.getElementById('dynamicMap');
        
        // Remove loading class when image loads
        img.onload = function() {
            log('Gambar loaded successfully');
            this.classList.remove('loading');
            createClickableAreas(currentPageId, img, mapEl);
        };
        
        img.onerror = function() {
            console.error(`❌ Gambar gagal dimuat: ${imageUrl}`);
            this.classList.remove('loading');
            this.alt = 'Gambar tidak tersedia';
            this.style.backgroundColor = '#ccc';
            this.style.minHeight = '200px';
            this.style.display = 'flex';
            this.style.alignItems = 'center';
            this.style.justifyContent = 'center';
            this.style.fontSize = '14px';
            this.style.color = '#666';
            
            // Show error message on image
            const errorDiv = document.createElement('div');
            errorDiv.style.position = 'absolute';
            errorDiv.style.top = '50%';
            errorDiv.style.left = '50%';
            errorDiv.style.transform = 'translate(-50%, -50%)';
            errorDiv.style.backgroundColor = 'rgba(0,0,0,0.7)';
            errorDiv.style.color = 'white';
            errorDiv.style.padding = '10px 20px';
            errorDiv.style.borderRadius = '8px';
            errorDiv.style.fontSize = '14px';
            errorDiv.textContent = 'Gambar tidak dapat dimuat';
            this.parentElement.style.position = 'relative';
            this.parentElement.appendChild(errorDiv);
        };
        
        // Handle resize with cleanup
        if (resizeHandler) {
            window.removeEventListener('resize', resizeHandler);
        }
        
        resizeHandler = () => {
            if (img && img.clientHeight > 0 && img.complete) {
                log('Resize detected');
                createClickableAreas(currentPageId, img, mapEl);
            }
        };
        
        window.addEventListener('resize', resizeHandler);
        
        // Initial creation if image already loaded
        if (img.complete && img.naturalHeight !== 0) {
            img.classList.remove('loading');
            createClickableAreas(currentPageId, img, mapEl);
        }
    }
    
    function showErrorMessage(message, details = '') {
        const errorHtml = `
            <div class="loading">
                <div class="error-message">
                    <h3>❌ ${sanitizeHTML(message)}</h3>
                    <p>${sanitizeHTML(details)}</p>
                    <br>
                    <p><strong>Langkah perbaikan:</strong></p>
                    <ul style="margin-left: 20px; margin-top: 10px;">
                        <li>Periksa koneksi internet Anda</li>
                        <li>Pastikan Google Sheet sudah dipublikasikan (File → Share → Publish to web)</li>
                        <li>Refresh halaman (F5)</li>
                        <li>Buka console browser (F12) untuk detail error</li>
                    </ul>
                    <br>
                    <button onclick="location.reload()" style="padding: 10px 20px; background: #ffd700; color: #1a3a1a; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">
                        🔄 Refresh Halaman
                    </button>
                </div>
            </div>
        `;
        document.getElementById('app').innerHTML = errorHtml;
    }
    
    // ============================================================
    // INITIALIZATION
    // ============================================================
    async function init() {
        log('🚀 Initializing website...');
        
        try {
            const success = await loadAllData();
            
            if (success && pagesData.length > 0) {
                renderPage();
            } else {
                showErrorMessage(
                    'Gagal Memuat Data',
                    'Tidak dapat mengambil data dari Google Sheet. Pastikan sheet sudah dipublikasikan dan dapat diakses publik.'
                );
            }
        } catch (error) {
            console.error('Initialization error:', error);
            showErrorMessage(
                'Error Inisialisasi',
                error.message || 'Terjadi kesalahan saat memuat aplikasi.'
            );
        }
    }
    
    // Start the application
    init();
</script>
